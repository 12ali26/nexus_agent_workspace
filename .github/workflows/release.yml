name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: nexus-ide
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_command: npx electron-builder --win --publish never
            artifact_name: nexus-ide-windows
            artifact_path: |
              nexus-ide/release/*.exe
          - name: macOS
            os: macos-latest
            build_command: npx electron-builder --mac --publish never
            artifact_name: nexus-ide-macos
            artifact_path: |
              nexus-ide/release/*.dmg
              nexus-ide/release/*.zip
          - name: Linux
            os: ubuntu-latest
            build_command: npx electron-builder --linux --publish never
            artifact_name: nexus-ide-linux
            artifact_path: |
              nexus-ide/release/*.AppImage
              nexus-ide/release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nexus-ide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Build installer
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release tag exists
        run: git ls-remote --exit-code --tags origin "refs/tags/${GITHUB_REF_NAME}"

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
            release-artifacts/*.zip
            release-artifacts/*.AppImage
            release-artifacts/*.deb

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: always() && (needs.release.result == 'success' || !startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/12ali26/nexus_agent_workspace/nexus-ide
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,prefix=sha-,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: nexus-ide
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
