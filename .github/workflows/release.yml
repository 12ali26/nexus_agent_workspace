name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: nexus-ide
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            build_command: npx electron-builder --win --publish never
            artifact_name: nexus-ide-windows
            artifact_path: |
              nexus-ide/release/*.exe
          - name: macOS
            os: macos-latest
            build_command: npx electron-builder --mac --publish never
            artifact_name: nexus-ide-macos
            artifact_path: |
              nexus-ide/release/*.dmg
              nexus-ide/release/*.zip
          - name: Linux
            os: ubuntu-latest
            build_command: npx electron-builder --linux --publish never
            artifact_name: nexus-ide-linux
            artifact_path: |
              nexus-ide/release/*.AppImage
              nexus-ide/release/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nexus-ide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build renderer
        run: npm run build

      - name: Build installer
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
